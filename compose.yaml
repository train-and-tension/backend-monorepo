name: traintension-backend

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${CORE_DB_NAME}
      POSTGRES_USER: ${CORE_DB_USERNAME}
      POSTGRES_PASSWORD: ${CORE_DB_PASSWORD}
    ports:
      - "${CORE_DB_HOST_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CORE_DB_USERNAME} -d ${CORE_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${ID_MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${ID_MONGO_PASSWORD}
    ports:
      - "${ID_MONGO_HOST_PORT}:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "${REDIS_HOST_PORT}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  core:
    build:
      context: .
      dockerfile: infra/docker/core.Dockerfile
    environment:
      CORE_PORT: ${CORE_PORT}
      CORE_DB_HOST: postgres
      CORE_DB_CONTAINER_PORT: 5432
      CORE_DB_NAME: ${CORE_DB_NAME}
      CORE_DB_USERNAME: ${CORE_DB_USERNAME}
      CORE_DB_PASSWORD: ${CORE_DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_CONTAINER_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      GATEWAY_PORT: ${GATEWAY_PORT}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED}
    ports:
      - "${CORE_PORT}:${CORE_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  identity:
    build:
      context: .
      dockerfile: infra/docker/identity.Dockerfile
    environment:
      IDENTITY_PORT: ${IDENTITY_PORT}
      ID_MONGO_HOST: mongo
      ID_MONGO_CONTAINER_PORT: 27017
      ID_MONGO_USERNAME: ${ID_MONGO_USERNAME}
      ID_MONGO_PASSWORD: ${ID_MONGO_PASSWORD}
      ID_MONGO_DATABASE: ${ID_MONGO_DATABASE}
      REDIS_HOST: redis
      REDIS_CONTAINER_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CORE_HOST: core
      CORE_PORT: ${CORE_PORT}
      GATEWAY_PORT: ${GATEWAY_PORT}
      JWT_EXPIRATION_SEC: ${JWT_EXPIRATION_SEC}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ENCRYPTION_SALT: ${ENCRYPTION_SALT}
      GOOGLE_WEB_CLIENT_ID: ${GOOGLE_WEB_CLIENT_ID}
      GOOGLE_ANDROID_CLIENT_ID: ${GOOGLE_ANDROID_CLIENT_ID}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
      USER_EMAILS: ${USER_EMAILS}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED}
    ports:
      - "${IDENTITY_PORT}:${IDENTITY_PORT}"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      core:
        condition: service_started

  gateway:
    build:
      context: .
      dockerfile: infra/docker/gateway.Dockerfile
    environment:
      GATEWAY_PORT: ${GATEWAY_PORT}
      IDENTITY_HOST: identity
      IDENTITY_PORT: ${IDENTITY_PORT}
      CORE_HOST: core
      CORE_PORT: ${CORE_PORT}
      AI_HOST: ${AI_HOST}
      AI_PORT: ${AI_PORT}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_PORT}"
    depends_on:
      identity:
        condition: service_started
      core:
        condition: service_started

volumes:
  postgres-data:
  mongo-data:
  redis-data:
