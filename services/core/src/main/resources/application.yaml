spring:
  jackson:
    mapper:
      default-view-inclusion: false
    date-format: "yyyy-MM-dd'T'HH:mm:ss"
    
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=1h

  flyway:
    enabled: true
    locations: classpath:db/migration

  application:
    name: core

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_CONTAINER_PORT:6379}
      password: ${REDIS_PASSWORD}

  datasource:
    url: jdbc:postgresql://${CORE_DB_HOST:127.0.0.1}:${CORE_DB_CONTAINER_PORT:5432}/${CORE_DB_NAME:traintension}?reWriteBatchedInserts=true&prepareThreshold=5&preparedStatementCacheQueries=256&preparedStatementCacheSizeMiB=20
    username: ${CORE_DB_USERNAME}
    password: ${CORE_DB_PASSWORD}

  output:
    ansi:
      enabled: ALWAYS

  threads:
    virtual:
      enabled: true

server:
  port: ${CORE_PORT}

springdoc:
  use-fqn: false
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}
    path: /swagger/core/v3/api-docs
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}
    path: /swagger/core/swagger-ui
    validator-url: none
    doc-expansion: list
    tags-sorter: alpha
    operations-sorter: method
    urls:
      - name: 1-admin
        display-name: Admin API
        url: /swagger/core/v3/api-docs/1-admin
      - name: 2-user
        display-name: User API
        url: /swagger/core/v3/api-docs/2-user
    urls-primary-name: 2-user

logging:
  level:
    org.flywaydb: DEBUG
    org.springframework.security: ${LOG_LEVEL_SECURITY:INFO}
    org.springframework.web: ${LOG_LEVEL_WEB:INFO}
    com.traintension: ${LOG_LEVEL_APP:INFO}
    root: INFO
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%5p) %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}"

app:
  redis:
    system-cache:
      database: 1
    personal-cache:
      database: 2
